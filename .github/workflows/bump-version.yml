name: Bump plugin version

on:
  push:
    branches: [main]

# allow the workflow to push the version bump back to the repo
permissions:
  contents: write

# never run two bumps at once
concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    # skip when the previous commit was the bump itself
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in plugin.json
        id: bump
        run: |
          set -euo pipefail
          FILE="sadensmol/.claude-plugin/plugin.json"

          current=$(jq -r '.version' "$FILE")
          IFS='.' read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"

          jq --arg v "$next" '.version = $v' "$FILE" > "$FILE.tmp"
          mv "$FILE.tmp" "$FILE"

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next"       >> "$GITHUB_OUTPUT"
          echo "Bumped $current -> $next"

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No version change, nothing to commit."
            exit 0
          fi

          git add sadensmol/.claude-plugin/plugin.json
          git commit -m "chore: bump plugin version to ${{ steps.bump.outputs.next }} [skip ci]"
          git push origin HEAD:main
